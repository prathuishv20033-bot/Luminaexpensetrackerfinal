<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#111112" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Premium Dark Background with Border -->
  <rect x="5" y="5" width="190" height="190" rx="48" fill="url(#bgGradient)" stroke="#555557" stroke-width="2" />
  
  <!-- The Logo Icon, perfectly centered and scaled -->
  <g transform="translate(50, 50) scale(1)" stroke="#ffffff" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)">
    <rect x="20" y="35" width="60" height="45" rx="8" />
    <path d="M20 50C35 55 65 55 80 50" />
    <rect x="42" y="48" width="16" height="8" rx="4" fill="#ffffff" />
    <circle cx="50" cy="18" r="9" />
    <path d="M50 13V23" strokeWidth="2.5" />
    <path d="M47 16H53" strokeWidth="2.5" />
    <path d="M47 20H53" strokeWidth="2.5" />
    <path d="M50 30V33" strokeWidth="2.5" />
  </g>
</svg>
